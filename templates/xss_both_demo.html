<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MICE IDS | Portal</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Orbitron', sans-serif;
            color: #00ffcc;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.8)), url("{{ url_for('static', filename='bg.png') }}");
            background-size: cover;
            background-position: center;
        }
        .card { background: rgba(10, 10, 10, 0.9); border: 1px solid #00ffcc; border-radius: 20px; width: 450px; padding: 30px; }
        .form-control { background: #000 !important; border: 1px solid #00ffcc !important; color: #00ffcc !important; }
        .btn-mice { background: linear-gradient(45deg, #00ffcc, #009966); color: #000; font-weight: bold; border: none; padding: 12px; }
        .logo { width: 100px; margin-bottom: 20px; filter: drop-shadow(0 0 10px #00ffcc); }
    </style>
</head>
<body>
    <div class="text-center">
        <img src="{{ url_for('static', filename='logo.png') }}" class="logo">
        <div class="card">
            <h2 class="mb-4">MICE IDS</h2>
            {% if message %}
            <div class="alert {{ status_class }}">{{ message }}</div>
            {% endif %}
            <form method="POST">
                <input type="text" name="user_input" class="form-control mb-3" placeholder="Input payload..." required>
                <button type="submit" class="btn btn-mice w-100">ENGAGE SHIELD</button>
            </form>
            <a href="/dashboard" class="d-block mt-4 text-decoration-none" style="color: #00ff99; font-size: 0.8rem;">OPEN DASHBOARD →</a>
        </div>
    </div>
</body>
</html>
