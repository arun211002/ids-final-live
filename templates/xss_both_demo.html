<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MICE IDS | Secure Portal</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --neon-cyan: #00ffcc;
            --neon-glow: rgba(0, 255, 204, 0.4);
            --dark-bg: #050505;
        }

        body {
            background-color: var(--dark-bg);
            background-image: 
                linear-gradient(rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.8)),
                url("{{ url_for('static', filename='bg.png') }}");
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #fff;
            font-family: 'Rajdhani', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            overflow: hidden;
        }

        /* --- CENTRAL UNIT --- */
        .main-frame {
            text-align: center;
            width: 100%;
            max-width: 480px;
            padding: 20px;
            animation: fadeIn 1.2s ease-out;
        }

        .system-logo {
            width: 130px;
            margin-bottom: 25px;
            filter: drop-shadow(0 0 15px var(--neon-cyan));
            transition: transform 0.3s ease;
        }

        .system-logo:hover {
            transform: scale(1.05) rotate(2deg);
        }

        .terminal-card {
            background: rgba(15, 15, 15, 0.9);
            border: 1px solid var(--neon-cyan);
            border-radius: 24px;
            padding: 40px;
            backdrop-filter: blur(10px);
            box-shadow: 0 0 40px rgba(0, 255, 204, 0.1);
            position: relative;
        }

        /* --- SCANNER EFFECT --- */
        .terminal-card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: var(--neon-cyan);
            box-shadow: 0 0 15px var(--neon-cyan);
            animation: scan 4s linear infinite;
            opacity: 0.3;
        }

        h2 {
            font-family: 'Orbitron', sans-serif;
            letter-spacing: 4px;
            font-weight: 700;
            color: var(--neon-cyan);
            text-shadow: 0 0 10px var(--neon-glow);
            margin-bottom: 5px;
        }

        .tagline {
            font-size: 0.8rem;
            letter-spacing: 6px;
            color: #666;
            text-transform: uppercase;
            margin-bottom: 30px;
        }

        /* --- INPUT STYLING --- */
        .form-control {
            background: rgba(0, 0, 0, 0.5) !important;
            border: 1px solid #333 !important;
            border-bottom: 2px solid var(--neon-cyan) !important;
            color: var(--neon-cyan) !important;
            border-radius: 8px;
            padding: 12px;
            font-family: 'Courier New', Courier, monospace;
            transition: 0.3s;
        }

        .form-control:focus {
            box-shadow: 0 0 15px var(--neon-glow);
            border-color: var(--neon-cyan);
        }

        /* --- BUTTON STYLING --- */
        .btn-engage {
            background: transparent;
            border: 1px solid var(--neon-cyan);
            color: var(--neon-cyan);
            font-family: 'Orbitron', sans-serif;
            font-weight: 600;
            letter-spacing: 2px;
            padding: 14px;
            width: 100%;
            margin-top: 20px;
            border-radius: 10px;
            transition: 0.4s;
            position: relative;
            overflow: hidden;
        }

        .btn-engage:hover {
            background: var(--neon-cyan);
            color: #000;
            box-shadow: 0 0 25px var(--neon-cyan);
        }

        .dashboard-link {
            display: inline-block;
            margin-top: 25px;
            color: #444;
            text-decoration: none;
            font-size: 0.75rem;
            letter-spacing: 2px;
            transition: 0.3s;
        }

        .dashboard-link:hover {
            color: var(--neon-cyan);
            text-shadow: 0 0 5px var(--neon-cyan);
        }

        /* --- ANIMATIONS --- */
        @keyframes scan {
            0% { top: 0; }
            50% { top: 100%; }
            100% { top: 0; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .alert {
            font-size: 0.85rem;
            border-radius: 10px;
            background: rgba(0,0,0,0.5);
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <div class="main-frame">
        <img src="{{ url_for('static', filename='logo.png') }}" alt="MICE LOGO" class="system-logo">

        <div class="terminal-card">
            <h2>MICE IDS</h2>
            <div class="tagline">Neural Network Shield</div>

            {% if message %}
            <div class="alert {{ status_class }} border-0 text-uppercase">
                {{ message }}
            </div>
            {% endif %}

            <form method="POST">
                <div class="mb-3">
                    <input type="text" name="user_input" class="form-control" placeholder="INSERT PAYLOAD TO SCAN..." required autocomplete="off">
                </div>
                <button type="submit" class="btn btn-engage">ENGAGE SHIELD</button>
            </form>

            <a href="/dashboard" class="dashboard-link">ACCESS ANALYTICS COMMAND →</a>
        </div>
        
        <p class="mt-4 small" style="color: #333; letter-spacing: 1px;">SYSTEM STATUS: ACTIVE // ENCRYPTED SESSION</p>
    </div>

</body>
</html>
