<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MICE-IDS | Attack Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --neon: #00ffcc; 
            --dark: #060606; 
            --info-blue: #0dcaf0; 
            --danger-red: #ff3366;
        }

        body { 
            background: linear-gradient(rgba(0,0,0,0.92), rgba(0,0,0,0.92)), 
                        url("{{ url_for('static', filename='IMG_20260320_141054.png') }}");
            background-size: cover; 
            background-attachment: fixed;
            background-position: center;
            color: #fff; 
            font-family: 'Orbitron', sans-serif;
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
        }

        /* Centered Navbar */
        .navbar { 
            border-bottom: 2px solid var(--neon); 
            background: rgba(0,0,0,0.85); 
            backdrop-filter: blur(10px); 
            padding: 20px 0;
        }

        .nav-brand-text { 
            color: var(--neon); 
            font-weight: bold; 
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* Cyberpunk Card Styling */
        .cyber-card { 
            background: rgba(15, 15, 15, 0.95); 
            border: 1px solid #333; 
            border-radius: 15px; 
            box-shadow: 0 0 30px rgba(0,0,0,0.8);
            position: relative;
            overflow: hidden;
        }

        .cyber-card::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 2px;
            background: linear-gradient(90deg, transparent, var(--neon), transparent);
        }

        .text-neon { 
            color: var(--neon); 
            text-shadow: 0 0 10px var(--neon); 
        }

        /* Form Inputs */
        input[type="text"] { 
            background: #111; 
            border: 1px solid #444; 
            color: #fff; 
            font-family: monospace;
            padding: 15px;
        }

        input[type="text"]:focus { 
            border-color: var(--neon); 
            box-shadow: 0 0 15px var(--neon); 
            background: #111; 
            color: #fff;
        }

        /* Buttons */
        .btn-neon { 
            background: var(--neon); 
            color: #000; 
            border: none; 
            text-transform: uppercase; 
            font-weight: bold; 
            letter-spacing: 1px;
            transition: 0.3s;
        }

        .btn-neon:hover { 
            background: #fff; 
            color: #000; 
            box-shadow: 0 0 20px #fff; 
            transform: translateY(-2px);
        }

        .btn-outline-neon {
            border: 1px solid var(--neon);
            color: var(--neon);
            transition: 0.3s;
        }

        .btn-outline-neon:hover {
            background: rgba(0, 255, 204, 0.1);
            color: #fff;
        }

        .alert-custom {
            border-radius: 8px;
            font-weight: bold;
            border-left: 5px solid;
        }
    </style>
</head>
<body>

<nav class="navbar mb-5">
    <div class="container d-flex justify-content-center">
        <div class="text-center">
            <img src="{{ url_for('static', filename='IMG_20260320_141054.png') }}" 
                 alt="MICE Logo"
                 style="width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--neon); box-shadow: 0 0 15px var(--neon); margin-bottom: 15px;">
            <h3 class="mb-0 nav-brand-text">MICE <span class="text-info">IDS</span> Portal</h3>
            <p class="text-secondary small mt-1">Global Intrusion Detection System</p>
        </div>
    </div>
</nav>

<div class="container flex-grow-1">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            <div class="card cyber-card p-4">
                <div class="card-body">
                    <h4 class="text-center mb-4 text-white-50">MANUAL INJECTION TEST</h4>
                    
                    <form method="POST">
                        <div class="mb-4">
                            <label class="form-label text-neon small">PAYLOAD INPUT</label>
                            <input type="text" name="user_input" class="form-control form-control-lg" 
                                   placeholder="e.g. <script>alert('XSS')</script>" required>
                        </div>
                        
                        <div class="d-grid gap-3">
                            <button type="submit" class="btn btn-lg btn-neon">Analyze & Intercept</button>
                            <a href="/dashboard" class="btn btn-outline-neon">View Command Dashboard</a>
                        </div>
                    </form>
                    
                    {% if message %}
                    <div class="alert mt-4 alert-custom {{ 'alert-danger' if 'ALERT' in message else 'alert-success' }}">
                        <div class="d-flex align-items-center">
                            <span class="fs-4 me-3">{{ '🛡️' if 'Clean' in message else '⚠️' }}</span>
                            <div>{{ message }}</div>
                        </div>
                    </div>
                    {% endif %}
                </div>
            </div>
            
            <p class="text-center mt-4 text-secondary small">
                System Status: <span class="text-neon">ONLINE</span> | Listening on Port: 5000
            </p>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
</body>
</html>
