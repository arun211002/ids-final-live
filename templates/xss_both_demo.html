<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cloud IDS Protection</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f0f2f5; padding-top: 60px; }
        .card { border-radius: 15px; border: none; }
    </style>
</head>
<body>
    <div class="container text-center" style="max-width: 500px;">
        <h2 class="mb-4">🛡️ IDS Shield</h2>
        
        {% if message %}
        <div class="alert {{ status_class }} shadow-sm">{{ message }}</div>
        {% endif %}

        <div class="card p-4 shadow">
            <form method="POST">
                <div class="mb-3 text-start">
                    <label class="form-label fw-bold">Test Security Input:</label>
                    <input type="text" name="user_input" class="form-control" placeholder="Type <script> to test..." required>
                </div>
                <button type="submit" class="btn btn-dark w-100">Submit to IDS</button>
            </form>
        </div>
        
        <div class="mt-4">
            <a href="/dashboard" class="text-decoration-none text-muted small">Access Admin Dashboard →</a>
        </div>
    </div>
</body>
</html>
