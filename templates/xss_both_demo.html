<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MICE IDS Protection</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

    <style>
        /* Ensures the background covers the entire screen regardless of device */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Orbitron', sans-serif;
            color: #00ffcc;
            
            /* --- RESPONSIVE FULL SCREEN BACKGROUND --- */
            background: linear-gradient(rgba(0, 0, 0, 0.8), rgba(0, 0, 0, 0.8)), 
                        url("{{ url_for('static', filename='bg.png') }}"); 
            background-size: cover;        /* Stretches to fill PC and Mobile */
            background-position: center;   /* Keeps the center of the image visible */
            background-attachment: fixed;  /* Prevents background from scrolling */
            background-repeat: no-repeat;
            
            /* Flexbox to perfectly center the card on any screen */
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
        }

        /* Responsive Watermark */
        .watermark {
            position: fixed;
            top: 50%;
            left: 50%;
            width: 80vw;  /* Adjusts based on Screen Width */
            height: 80vh; /* Adjusts based on Screen Height */
            max-width: 700px;
            max-height: 700px;
            transform: translate(-50%, -50%);
            background: url("{{ url_for('static', filename='logo.png') }}") no-repeat center;
            background-size: contain;
            opacity: 0.05;
            z-index: -1;
        }

        .tagline {
            font-size: 0.8rem;
            letter-spacing: 6px;
            text-transform: uppercase;
            color: #00ff99;
            margin-bottom: 2.5rem;
            opacity: 0.8;
        }

        .card {
            background: rgba(15, 15, 15, 0.9);
            border: 1px solid #00ffcc;
            border-radius: 20px;
            box-shadow: 0 0 25px rgba(0, 255, 204, 0.15);
            backdrop-filter: blur(12px);
            padding: 40px;
            width: 100%;
            max-width: 450px; /* Limits width on PC so it doesn't look stretched */
        }

        .form-control {
            background: #000 !important;
            border: 1px solid #00ffcc !important;
            color: #00ffcc !important;
            border-radius: 8px;
            padding: 12px;
        }

        .btn-mice {
            background: linear-gradient(45deg, #00ffcc, #009966);
            border: none;
            color: #000;
            font-weight: 700;
            letter-spacing: 1px;
            padding: 12px;
            transition: 0.4s;
            text-transform: uppercase;
        }

        .btn-mice:hover {
            box-shadow: 0 0 20px rgba(0, 255, 204, 0.6);
            transform: translateY(-2px);
        }

        .alert {
            background: rgba(0, 0, 0, 0.8);
            border-radius: 12px;
            font-weight: 500;
            border: 1px solid;
            margin-bottom: 25px;
        }

        .alert-danger { color: #ff4d4d; border-color: #ff4d4d; }
        .alert-success { color: #00ffcc; border-color: #00ffcc; }

        .dashboard-link {
            display: inline-block;
            margin-top: 30px;
            color: #00ff99;
            text-decoration: none;
            font-size: 0.75rem;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="watermark"></div>

    <div class="container d-flex flex-column align-items-center">
        
        <h1 class="fw-bold mb-0" style="letter-spacing: 3px;">MICE</h1>
        <p class="mb-1" style="font-size: 0.8rem; color: #00ffcc;">XSS SECURE IDS</p>
        <div class="tagline">let’s seek</div>
        
        {% if message %}
        <div class="alert {{ status_class }} w-100" style="max-width: 450px;">
            {{ message }}
        </div>
        {% endif %}

        <div class="card shadow">
            <form method="POST">
                <div class="mb-4 text-start">
                    <label class="form-label small fw-bold" style="color: #00ff99;">SECURITY TEST INPUT</label>
                    <input type="text" name="user_input" class="form-control" placeholder="Input payload here..." required>
                </div>
                <button type="submit" class="btn btn-mice w-100">Initialize Shield</button>
            </form>
        </div>

        <a href="/dashboard" class="dashboard-link">ACCESS THREAT ANALYTICS →</a>
    </div>

</body>
</html>
