<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MICE IDS | Entrance</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.8)), url("{{ url_for('static', filename='bg.png') }}");
            background-size: cover; background-position: center;
            height: 100vh; display: flex; align-items: center; justify-content: center;
            color: #00ffcc; font-family: 'Orbitron', sans-serif; margin: 0;
        }
        .card { background: rgba(15, 15, 15, 0.95); border: 1px solid #00ffcc; border-radius: 20px; width: 450px; padding: 40px; box-shadow: 0 0 30px rgba(0, 255, 204, 0.2); }
        .logo { width: 120px; margin-bottom: 25px; filter: drop-shadow(0 0 10px #00ffcc); transition: 0.3s; }
        .logo:hover { transform: scale(1.05); }
        .form-control { background: #000 !important; border: 1px solid #00ffcc !important; color: #00ffcc !important; text-align: center; }
        .btn-mice { background: linear-gradient(45deg, #00ffcc, #009966); border: none; font-weight: 700; color: #000; padding: 15px; }
    </style>
</head>
<body>
    <div class="text-center">
        <img src="{{ url_for('static', filename='logo.png') }}" class="logo">
        <div class="card">
            <h2 class="mb-0">MICE IDS</h2>
            <p class="mb-4 small" style="letter-spacing: 5px;">PROTECTION ACTIVE</p>
            
            {% if message %}
            <div class="alert {{ status_class }} py-2 small">{{ message }}</div>
            {% endif %}

            <form method="POST">
                <input type="text" name="user_input" class="form-control mb-3" placeholder="Analyze network probe..." required>
                <button type="submit" class="btn btn-mice w-100">INITIALIZE SHIELD</button>
            </form>
            <a href="/dashboard" class="d-block mt-4 text-decoration-none" style="color: #00ff99; font-size: 0.75rem; letter-spacing: 2px;">OPEN ANALYTICS COMMAND →</a>
        </div>
    </div>
</body>
</html>
