<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MICE IDS | Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00ffcc; --bg: #060606; --card: #111111; }
        body { background: var(--bg); color: #fff; font-family: 'Orbitron', sans-serif; min-height: 100vh; }
        .navbar { border-bottom: 2px solid var(--neon); background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); }
        .card { background: var(--card); border: 1px solid #333; border-radius: 10px; }
        .card-header { color: var(--neon); background: #1a1a1a; border-bottom: 1px solid #333; padding: 15px; }
        .table-dark { background: transparent !important; }
        .table-dark thead th { color: var(--neon); background: #1a1a1a; border-bottom: 2px solid #333; }
        .badge-neon { border: 1px solid var(--neon); color: var(--neon); background: transparent; padding: 8px 15px; }
        canvas { max-height: 250px !important; }
    </style>
</head>
<body>

<nav class="navbar py-3 mb-4">
    <div class="container d-flex justify-content-between">
        <div class="d-flex align-items-center">
            <img src="{{ url_for('static', filename='logo.png') }}" style="width: 40px; margin-right: 15px; filter: drop-shadow(0 0 5px var(--neon));">
            <h3 class="mb-0">MICE <span class="fw-light">IDS</span></h3>
        </div>
        <div>
            <span class="badge badge-neon me-3">LOGS: {{ chart_data.total_count }}</span>
            <a href="/" class="btn btn-outline-light btn-sm">EXIT TERMINAL</a>
        </div>
    </div>
</nav>

<div class="container">
    <div class="row g-4 mb-4">
        <div class="col-lg-6">
            <div class="card h-100"><div class="card-header text-center">THREAT CLASSIFICATION</div>
                <div class="card-body"><canvas id="typeChart"></canvas></div>
            </div>
        </div>
        <div class="col-lg-6">
            <div class="card h-100"><div class="card-header text-center">TOP SOURCE IPs</div>
                <div class="card-body"><canvas id="ipChart"></canvas></div>
            </div>
        </div>
    </div>

    <div class="card mb-5">
        <div class="card-header">INTERCEPTION LOGS</div>
        <div class="table-responsive">
            <table class="table table-dark table-hover mb-0">
                <thead><tr><th>Timestamp</th><th>Origin IP</th><th>Payload Snippet</th><th>Type</th></tr></thead>
                <tbody>
                    {% for log in all_logs %}
                    <tr>
                        <td class="text-muted" style="font-size: 0.8rem;">{{ log.timestamp }}</td>
                        <td style="color: var(--neon);">{{ log.ip }}</td>
                        <td><code style="color: #ff9900;">{{ log.payload }}</code></td>
                        <td><span class="badge" style="border: 1px solid #ffc107; color: #ffc107;">{{ log.type }}</span></td>
                    </tr>
                    {% else %}
                    <tr><td colspan="4" class="text-center text-muted">No logs detected.</td></tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const data = {{ chart_data | tojson }};
    Chart.defaults.color = '#888';
    Chart.defaults.font.family = 'Orbitron';

    new Chart(document.getElementById("typeChart"), {
        type: 'doughnut',
        data: { labels: data.type_labels, datasets: [{ data: data.type_values, backgroundColor: ['#00ffcc', '#009988', '#333'], borderWidth: 0 }] },
        options: { cutout: '75%', plugins: { legend: { position: 'bottom' } } }
    });

    new Chart(document.getElementById("ipChart"), {
        type: 'bar',
        data: { labels: data.ip_labels, datasets: [{ data: data.ip_values, backgroundColor: '#00ffcc' }] },
        options: { plugins: { legend: { display: false } }, scales: { y: { beginAtZero: true } } }
    });
</script>
</body>
</html>
