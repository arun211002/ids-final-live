<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>MICE IDS | Global Command Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --neon: #00ffcc; --dark: #060606; }
        body { 
            background: linear-gradient(rgba(0,0,0,0.9), rgba(0,0,0,0.9)), 
                        url("{{ url_for('static', filename='IMG_20260320_141054.png') }}");
            background-size: cover; background-attachment: fixed;
            color: #fff; font-family: 'Orbitron', sans-serif; 
        }
        .navbar { border-bottom: 2px solid var(--neon); background: rgba(0,0,0,0.8); backdrop-filter: blur(10px); }
        .card { background: rgba(17, 17, 17, 0.9); border: 1px solid #333; border-radius: 12px; }
        .card-header { color: var(--neon); border-bottom: 1px solid #333; font-weight: bold; }
        .table-scroll { max-height: 400px; overflow-y: auto; }
        .ts-white { color: #ffffff !important; font-weight: bold; }
        .ip-neon { color: var(--neon) !important; }
        .badge-threat { font-size: 0.7rem; text-transform: uppercase; }
    </style>
</head>
<body>

<nav class="navbar py-3 mb-4">
    <div class="container d-flex justify-content-between align-items-center">
        <div class="d-flex align-items-center">
            <img src="{{ url_for('static', filename='IMG_20260320_141054.png') }}" 
                 style="width: 45px; height: 45px; border-radius: 50%; border: 2px solid var(--neon); margin-right: 15px;">
            <h3 class="mb-0">MICE <span class="fw-light text-info">IDS</span></h3>
        </div>
        <span class="badge border border-info text-info px-3 py-2">GLOBAL THREATS: {{ chart_data.total_count }}</span>
    </div>
</nav>

<div class="container">
    <div class="row g-4 mb-4">
        <div class="col-md-6">
            <div class="card p-3"><canvas id="typeChart"></canvas></div>
        </div>
        <div class="col-md-6">
            <div class="card p-3"><canvas id="ipChart"></canvas></div>
        </div>
    </div>

    <div class="card">
        <div class="card-header p-3">LIVE INTERCEPTION LOGS</div>
        <div class="table-scroll">
            <table class="table table-dark table-hover mb-0">
                <thead class="sticky-top bg-dark">
                    <tr><th>Time</th><th>Origin IP</th><th>Payload</th><th>Category</th></tr>
                </thead>
                <tbody>
                    {% for log in all_logs %}
                    <tr>
                        <td class="ts-white">{{ log.timestamp }}</td>
                        <td class="ip-neon">{{ log.ip }}</td>
                        <td><code class="text-warning">{{ log.payload[:60] }}</code></td>
                        <td><span class="badge bg-danger badge-threat">{{ log.type }}</span></td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const ctx1 = document.getElementById('typeChart').getContext('2d');
    const ctx2 = document.getElementById('ipChart').getContext('2d');
    const data = {{ chart_data | tojson }};

    new Chart(ctx1, {
        type: 'doughnut',
        data: {
            labels: data.type_labels,
            datasets: [{ data: data.type_values, backgroundColor: ['#00ffcc', '#009988', '#ff3366'], borderWidth: 0 }]
        },
        options: { plugins: { legend: { labels: { color: '#fff' } } } }
    });

    new Chart(ctx2, {
        type: 'bar',
        data: {
            labels: data.ip_labels,
            datasets: [{ label: 'Attacks', data: data.ip_values, backgroundColor: '#00ffcc' }]
        },
        options: { scales: { y: { beginAtZero: true, ticks: { color: '#fff' } }, x: { ticks: { color: '#fff' } } } }
    });
</script>
</body>
</html>
